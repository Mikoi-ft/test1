<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клиническая медицина — Тренажёр</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Spectral:wght@400;500;600&display=swap');
:root{
  --bg:#0e1219; --panel:#161d27; --panel2:#1c2530; --line:#263040;
  --ink:#e8edf2; --mut:#8a9fb2; --accent:#46d18a; --accent2:#3ba3ff;
  --wrong:#ff6b6b; --warn:#e0b34a; --gold:#d9b25a; --golddim:#b8923f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 70% -10%,#1a2838 0%,var(--bg) 55%);
  color:var(--ink);font-family:'Spectral',Georgia,serif;min-height:100vh;line-height:1.5}
.wrap{max-width:680px;margin:0 auto;padding:18px 16px 96px}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.55rem;margin:.15em 0 .05em;letter-spacing:-.01em}
.sub{color:var(--mut);font-size:.91rem;margin-bottom:18px}

/* BUTTONS */
.btn{display:block;width:100%;border:none;border-radius:13px;padding:15px 16px;
  font:inherit;font-size:1.04rem;cursor:pointer;margin-bottom:10px;text-align:left;transition:.12s}
.btn:active{transform:scale(.99)}
.btn-green{background:linear-gradient(135deg,var(--accent),#2fae72);color:#06140c;font-weight:600}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--golddim));color:#1a1206;font-weight:600}
.btn-dark{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.btn-dark:hover{border-color:var(--accent)}
.btn-row{display:flex;gap:10px}
.btn-row .btn{flex:1}

/* SECTION CARDS */
.mode-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:20px 18px;margin-bottom:14px;cursor:pointer;transition:.12s}
.mode-card:hover{border-color:var(--accent2);transform:translateY(-2px)}
.mode-card h2{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:600;margin-bottom:4px}
.mode-card p{color:var(--mut);font-size:.9rem}
.mode-card .badge{display:inline-block;background:var(--panel2);border:1px solid var(--line);
  border-radius:20px;padding:3px 11px;font-size:.82rem;color:var(--accent2);margin-top:8px}

/* PROGRESS */
.meta{display:flex;justify-content:space-between;align-items:center;
  color:var(--mut);font-size:.84rem;margin-bottom:10px}
.pill{background:var(--panel2);border:1px solid var(--line);padding:4px 11px;border-radius:20px}
.bar{height:5px;background:var(--panel2);border-radius:5px;overflow:hidden;margin-bottom:16px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));
  width:0;transition:.3s}

/* FLASHCARD */
.flash{background:var(--panel);border:1px solid var(--line);border-radius:18px;
  padding:24px 18px;min-height:280px;display:flex;flex-direction:column;
  box-shadow:0 10px 30px rgba(0,0,0,.3)}
.tag{font-family:'Fraunces',serif;font-size:.75rem;letter-spacing:.04em;
  color:var(--accent2);text-transform:uppercase;margin-bottom:10px}
.qtext{font-size:1.13rem;font-weight:500;line-height:1.48;flex:1}
.hint{color:var(--mut);font-size:.84rem;text-align:center;margin-top:16px;font-style:italic}
.divider{height:1px;background:var(--line);margin:18px 0}
.alabel{font-family:'Fraunces',serif;font-size:.76rem;color:var(--accent);
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
.atext{font-size:1.05rem;line-height:1.55;color:#d8f0e0}
.rate-row{display:flex;gap:10px;margin-top:14px}
.rate-row .btn{flex:1;font-size:1.02rem;font-weight:600;padding:14px}
.btn-again{background:rgba(224,146,90,.14);color:#e0925a;border:1px solid rgba(224,146,90,.35)}
.btn-know{background:rgba(70,209,138,.14);color:var(--accent);border:1px solid rgba(70,209,138,.35)}

/* QUIZ */
.qcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 16px}
.qcard .qtext{margin:6px 0 14px}
.opt{display:flex;gap:10px;align-items:flex-start;background:var(--panel2);
  border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;
  cursor:pointer;transition:.11s;font-size:1rem}
.opt:hover{border-color:var(--accent2)}
.ltr{flex:none;width:24px;height:24px;border-radius:50%;background:var(--bg);
  border:1px solid var(--line);display:grid;place-items:center;
  font-size:.83rem;color:var(--mut);font-family:'Fraunces',serif}
.opt.correct{border-color:var(--accent);background:rgba(70,209,138,.11)}
.opt.correct .ltr{background:var(--accent);color:#06140c;border-color:var(--accent)}
.opt.wrong{border-color:var(--wrong);background:rgba(255,107,107,.09)}
.opt.wrong .ltr{background:var(--wrong);color:#190606;border-color:var(--wrong)}
.opt.lock{cursor:default}
.fb{margin-top:10px;font-size:.93rem;min-height:1.2em}
.fb.ok{color:var(--accent)} .fb.no{color:var(--wrong)}
.nav-row{display:flex;gap:10px;margin-top:12px}
.nav-row .btn{flex:1;padding:13px;font-size:.98rem}

/* RESULTS */
.score{font-family:'Fraunces',serif;font-size:3rem;font-weight:600;text-align:center;margin:.15em 0}
.scsub{text-align:center;color:var(--mut);margin-bottom:20px}

/* TOPIC LIST */
.topicbtn{display:flex;justify-content:space-between;align-items:center;width:100%;
  background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:12px;padding:13px 16px;margin-bottom:9px;font:inherit;
  font-size:1rem;cursor:pointer;text-align:left;transition:.12s}
.topicbtn:hover{border-color:var(--gold)}
.topicbtn .cnt{color:var(--mut);font-size:.83rem;background:var(--bg);
  padding:3px 10px;border-radius:20px;flex-shrink:0}

/* FOOT */
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(14,18,25,.93);
  backdrop-filter:blur(8px);border-top:1px solid var(--line);
  padding:9px 16px;display:flex;justify-content:center;gap:10px}
.foot button{background:none;border:1px solid var(--line);color:var(--mut);
  border-radius:20px;padding:7px 16px;font:inherit;font-size:.86rem;cursor:pointer}
.foot button:hover{color:var(--ink);border-color:var(--mut)}
.hide{display:none}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="foot">
  <button onclick="goHome()">☰ Меню</button>
  <button id="ft-back" class="hide" onclick="goBack()">← Назад</button>
</div>

<script>
// ── data loaded from separate JSON files ──
let CARDS=[], QUIZ=[];
let backFn = null;

async function loadData(){
  [CARDS, QUIZ] = await Promise.all([
    fetch('cards.json').then(r=>r.json()),
    fetch('quiz.json').then(r=>r.json()),
  ]);
  goHome();
}

const L=['A','B','C','D','E'];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setBack(fn){ backFn=fn; document.getElementById('ft-back').classList.toggle('hide',!fn); }
function goBack(){ if(backFn) backFn(); }

// ── HOME ──
function goHome(){
  setBack(null);
  document.getElementById('app').innerHTML=`
  <h1>Клиническая медицина</h1>
  <div class="sub">Тренажёр для подготовки к экзамену</div>
  <div class="mode-card" onclick="showCardMenu()">
    <h2>🃏 Карточки</h2>
    <p>Вопрос → вспоминаешь → открываешь ответ → «Знаю» или «Повторить». В конце прогоняет только слабые.</p>
    <span class="badge">${CARDS.length} карточек</span>
  </div>
  <div class="mode-card" onclick="showQuizMenu()">
    <h2>📝 Тест с вариантами</h2>
    <p>Вопрос с вариантами A–E как на экзамене. Сразу видишь правильный. В конце — работа над ошибками.</p>
    <span class="badge">${QUIZ.length} вопросов</span>
  </div>`;
}

// ── CARD MENU ──
function cardTopics(){
  const m={};
  CARDS.forEach(c=>(m[c.level]=m[c.level]||[]).push(c));
  return m;
}
function showCardMenu(){
  setBack(goHome);
  const t=cardTopics();
  let h=`<h1>🃏 Карточки</h1>
  <div class="sub">${CARDS.length} карточек по трём уровням сложности</div>
  <button class="btn btn-gold" onclick="startCards(shuffle(CARDS),'Все вперемешку')">🔀 Все вперемешку</button>
  <button class="btn btn-dark" onclick="startCards(CARDS.slice(),'Все по порядку')">↓ По порядку</button>
  <div class="sub" style="margin-top:18px">По уровням:</div>`;
  ['ЗАПОМИНАНИЕ','ПОНИМАНИЕ','ПРИМЕНЕНИЕ'].forEach(lv=>{
    if(!t[lv]) return;
    h+=`<button class="topicbtn" onclick="startCards(shuffle(cardTopics()['${lv}']),'${lv}')">
      <span>${lv[0]+lv.slice(1).toLowerCase()}</span>
      <span class="cnt">${t[lv].length}</span></button>`;
  });
  document.getElementById('app').innerHTML=h;
}

// ── CARDS RUNNER ──
let cst={};
let cAgain=[];
function startCards(pool,title){
  setBack(showCardMenu);
  cst={pool,i:0,know:0,title,flipped:false}; cAgain=[]; renderCard();
}
function renderCard(){
  const {pool,i}=cst;
  if(i>=pool.length) return cardDone();
  const c=pool[i];
  const prog=Math.round(i/pool.length*100);
  let h=`<div class="meta"><span class="pill">${cst.title}</span>
    <span>${i+1} / ${pool.length} · ✓ ${cst.know}</span></div>
  <div class="bar"><i style="width:${prog}%"></i></div>
  <div class="flash">
    <div class="tag">${c.level[0]+c.level.slice(1).toLowerCase()}</div>
    <div class="qtext">${esc(c.q)}</div>`;
  if(!cst.flipped){
    h+=`<div class="hint">вспомни ответ</div>
    <button class="btn btn-gold" style="margin-top:14px" onclick="flipCard()">Показать ответ</button>`;
  } else {
    h+=`<div class="divider"></div>
    <div class="alabel">Ответ</div>
    <div class="atext">${esc(c.a)}</div>
    <div class="rate-row">
      <button class="btn btn-again" onclick="rateCard(false)">↻ Повторить</button>
      <button class="btn btn-know" onclick="rateCard(true)">✓ Знаю</button>
    </div>`;
  }
  h+=`</div>`;
  document.getElementById('app').innerHTML=h; window.scrollTo(0,0);
}
function flipCard(){cst.flipped=true;renderCard();}
function rateCard(ok){
  if(ok) cst.know++; else cAgain.push(cst.pool[cst.i]);
  cst.i++; cst.flipped=false; renderCard();
}
function cardDone(){
  const tot=cst.pool.length,k=cst.know,pct=Math.round(k/tot*100);
  const col=pct>=80?'var(--accent)':pct>=60?'var(--accent2)':'var(--warn)';
  let h=`<h1>Результат</h1>
  <div class="score" style="color:${col}">${pct}%</div>
  <div class="scsub">${k} из ${tot} знаю</div>`;
  if(cAgain.length){
    window._cAgain=cAgain.slice();
    h+=`<button class="btn btn-gold" onclick="startCards(shuffle(window._cAgain),'Повтор (${cAgain.length})')">↻ Прогнать ошибки (${cAgain.length})</button>`;
  } else { h+=`<div class="scsub" style="color:var(--accent)">Всё знаю 🎉</div>`; }
  h+=`<button class="btn btn-dark" onclick="showCardMenu()">← К карточкам</button>`;
  document.getElementById('app').innerHTML=h; window.scrollTo(0,0);
}

// ── QUIZ MENU ──
function quizTopics(){
  const m={};
  QUIZ.forEach(q=>(m[q.topic]=m[q.topic]||[]).push(q));
  return m;
}
function showQuizMenu(){
  setBack(goHome);
  const t=quizTopics();
  const order=Object.keys(t).sort((a,b)=>t[b].length-t[a].length);
  let h=`<h1>📝 Тест с вариантами</h1>
  <div class="sub">${QUIZ.length} вопросов с вариантами A–E</div>
  <button class="btn btn-green" onclick="startQuiz(QUIZ.slice(),'Все вопросы')">▶ Все по порядку</button>
  <button class="btn btn-dark" onclick="startQuiz(shuffle(QUIZ),'Все вперемешку')">🔀 Все вперемешку</button>
  <button class="btn btn-dark" onclick="startQuiz(shuffle(QUIZ).slice(0,50),'Экзамен — 50')">📋 Пробный экзамен (50)</button>
  <div class="sub" style="margin-top:18px">По темам:</div>`;
  order.forEach(name=>{
    h+=`<button class="topicbtn" onclick="startQuiz(shuffle(quizTopics()['${CSS.escape?CSS.escape(name):name}']),'${esc(name)}')" data-topic="${esc(name)}">
      <span>${esc(name)}</span><span class="cnt">${t[name].length}</span></button>`;
  });
  document.getElementById('app').innerHTML=h;
  // fix topic button onclick (special chars in names)
  document.querySelectorAll('[data-topic]').forEach(btn=>{
    const name=btn.getAttribute('data-topic');
    btn.onclick=()=>startQuiz(shuffle(quizTopics()[name]),name);
  });
}

// ── QUIZ RUNNER ──
let qst={};
let qMissed=[];
function startQuiz(pool,title){
  setBack(showQuizMenu);
  qst={pool,i:0,answered:[],correct:0,title}; qMissed=[]; renderQuiz();
}
function renderQuiz(){
  const {pool,i}=qst;
  if(i>=pool.length) return quizDone();
  const q=pool[i];
  const prog=Math.round(i/pool.length*100);
  let h=`<div class="meta"><span class="pill">${esc(qst.title)}</span>
    <span>${i+1} / ${pool.length} · ✓ ${qst.correct}</span></div>
  <div class="bar"><i style="width:${prog}%"></i></div>
  <div class="qcard">
    <div class="tag">№${q.num} · ${esc(q.topic)}</div>
    <div class="qtext">${esc(q.q)}</div>
    <div id="opts">`;
  q.options.forEach((o,idx)=>{
    h+=`<div class="opt" id="o${idx}" onclick="pickQ(${idx})">
      <span class="ltr">${L[idx]||idx}</span><span>${esc(o)}</span></div>`;
  });
  h+=`</div><div class="fb" id="fb"></div>
  <div class="nav-row">
    <button class="btn btn-green" id="nxt" onclick="nextQ()" disabled>Дальше →</button>
  </div></div>`;
  document.getElementById('app').innerHTML=h; window.scrollTo(0,0);
}
function pickQ(idx){
  if(qst.answered[qst.i]!==undefined) return;
  qst.answered[qst.i]=idx;
  document.querySelectorAll('.opt').forEach(e=>e.classList.add('lock'));
  const right=qst.pool[qst.i].answer;
  document.getElementById('o'+right).classList.add('correct');
  const fb=document.getElementById('fb');
  if(idx===right){qst.correct++;fb.className='fb ok';fb.textContent='✓ Верно';}
  else{
    document.getElementById('o'+idx).classList.add('wrong');
    fb.className='fb no';
    fb.textContent='✗ Ответ: '+L[right]+' — '+qst.pool[qst.i].options[right];
    if(!qMissed.find(m=>m.num===qst.pool[qst.i].num)) qMissed.push(qst.pool[qst.i]);
  }
  const nxt=document.getElementById('nxt');
  nxt.disabled=false;
  nxt.textContent=(qst.i+1>=qst.pool.length)?'Результат':'Дальше →';
}
function nextQ(){qst.i++;renderQuiz();}
function quizDone(){
  const tot=qst.pool.length,c=qst.correct,pct=Math.round(c/tot*100);
  const col=pct>=80?'var(--accent)':pct>=60?'var(--accent2)':'var(--warn)';
  const msg=pct>=80?'Отлично 💪':pct>=60?'Норм, добей слабые темы':'Ещё прогони';
  let h=`<h1>Результат</h1>
  <div class="score" style="color:${col}">${pct}%</div>
  <div class="scsub">${c} из ${tot} · ${msg}</div>`;
  if(qMissed.length){
    window._qMissed=qMissed.slice();
    h+=`<button class="btn btn-green" onclick="startQuiz(shuffle(window._qMissed),'Ошибки (${qMissed.length})')">↻ Прогнать ошибки (${qMissed.length})</button>`;
    h+=`<div class="sub" style="margin-top:16px">Что завалила:</div>`;
    qMissed.forEach(q=>{
      h+=`<div style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 14px;margin-bottom:10px">
        <div class="tag">№${q.num} · ${esc(q.topic)}</div>
        <div style="font-size:.97rem;margin:4px 0 8px">${esc(q.q)}</div>
        <div style="color:var(--accent)">✓ ${L[q.answer]} — ${esc(q.options[q.answer])}</div></div>`;
    });
  }
  h+=`<button class="btn btn-dark" onclick="showQuizMenu()">← К тестам</button>`;
  document.getElementById('app').innerHTML=h; window.scrollTo(0,0);
}

loadData();
</script>
</body>
</html>
